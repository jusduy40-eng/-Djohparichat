<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ | Admin - Djohparichat</title>
    
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- CSS -->
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/admin.css">
    
    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            padding: 20px;
        }
        
        .login-card {
            background: white;
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            animation: slideUp 0.5s ease;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .logo {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
            text-decoration: none;
            color: #1e88e5;
            font-weight: 700;
            font-size: 1.5rem;
        }
        
        .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #1e88e5 0%, #42a5f5 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.75rem;
        }
        
        .login-header h2 {
            margin: 0 0 8px;
            font-size: 1.8rem;
            color: #1e293b;
            font-weight: 700;
        }
        
        .login-header p {
            margin: 0;
            color: #64748b;
            font-size: 0.95rem;
        }
        
        .admin-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .admin-form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .admin-form-group label {
            font-weight: 600;
            color: #475569;
            font-size: 0.9rem;
        }
        
        .admin-form-group input[type="email"],
        .admin-form-group input[type="password"] {
            padding: 14px 18px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.2s ease;
            outline: none;
            font-family: inherit;
        }
        
        .admin-form-group input:focus {
            border-color: #1e88e5;
            box-shadow: 0 0 0 4px rgba(30, 136, 229, 0.1);
        }
        
        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-family: inherit;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #1e88e5 0%, #42a5f5 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(30, 136, 229, 0.3);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(30, 136, 229, 0.4);
        }
        
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }
        
        .btn-full {
            width: 100%;
        }
        
        .text-center {
            text-align: center;
        }
        
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1e293b;
            color: white;
            padding: 14px 28px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            font-size: 0.95rem;
            z-index: 10000;
            transition: transform 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
        
        .toast.success { background: #10b981; }
        .toast.error { background: #ef4444; }
        
        .security-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 24px;
            padding: 12px;
            background: #f0f9ff;
            border-radius: 10px;
            color: #0369a1;
            font-size: 0.85rem;
        }
        
        .security-badge i {
            color: #10b981;
        }
    </style>
</head>
<body>
    <section class="login-page">
        <div class="login-card">
            <div class="login-header">
                <a href="../index" class="logo">
                    <span class="logo-icon"><i class="fas fa-graduation-cap"></i></span>
                    <span class="logo-text">Djohparichat</span>
                </a>
                <h2>🔐 เข้าสู่ระบบผู้ดูแลระบบ</h2>
                <p>กรุณาเข้าสู่ระบบเพื่อจัดการเว็บไซต์</p>
            </div>
            
            <form id="loginForm" class="admin-form">
                <div class="admin-form-group">
                    <label for="email">
                        <i class="fas fa-envelope"></i> อีเมล
                    </label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        required 
                        placeholder="admin@djohparichat.site"
                        autocomplete="email"
                    >
                </div>
                
                <div class="admin-form-group">
                    <label for="password">
                        <i class="fas fa-lock"></i> รหัสผ่าน
                    </label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        required 
                        placeholder="••••••••"
                        autocomplete="current-password"
                    >
                </div>
                
                <div class="admin-form-group">
                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                        <input type="checkbox" name="remember" style="width: 18px; height: 18px; cursor: pointer;">
                        <span>จดจำฉัน</span>
                    </label>
                </div>
                
                <button type="submit" class="btn btn-primary btn-full" id="loginBtn">
                    <span>เข้าสู่ระบบ</span>
                    <i class="fas fa-sign-in-alt"></i>
                </button>
            </form>
            
            <div class="security-badge">
                <i class="fas fa-shield-alt"></i>
                <span>ระบบรักษาความปลอดภัยแบบสองชั้น</span>
            </div>
            
            <p class="text-center" style="margin-top: 24px;">
                <a href="../index" style="color: #64748b; text-decoration: none;">
                    <i class="fas fa-arrow-left"></i>
                    <span>กลับหน้าหลัก</span>
                </a>
            </p>
        </div>
    </section>

    <!-- Toast Notification -->
    <div class="toast" id="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toastMessage">ข้อความ</span>
    </div>

    <!-- Scripts -->
    <script type="module">
        // ========== CONFIG ==========
        let config;
        let supabase;
        
        try {
            const configModule = await import('../lib/config.js');
            config = configModule.config;
        } catch (e) {
            console.warn('⚠️ Using fallback config');
            config = {
                supabaseUrl: 'https://srtsdminbdmxtvjgriev.supabase.co',
                supabaseAnonKey: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNydHNkbWluYmRteHR2amdyaWV2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY4OTU2NzMsImV4cCI6MjA1MjQ3MTY3M30.XYZ123',
                adminEmail: ['jusduy40@gmail.com']
            };
        }
        
        // Initialize Supabase
        try {
            if (config && config.supabaseUrl && config.supabaseAnonKey) {
                supabase = window.supabase.createClient(config.supabaseUrl, config.supabaseAnonKey);
                console.log('✅ Supabase initialized');
            }
        } catch (e) {
            console.error('❌ Failed to initialize Supabase:', e);
        }

        // ========== DOM ELEMENTS ==========
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const toast = document.getElementById('toast');
        const toastMessage = document.getElementById('toastMessage');

        // ========== LOGIN HANDLER ==========
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const rememberMe = document.querySelector('input[name="remember"]')?.checked;
            
            // Disable button
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> <span>กำลังตรวจสอบ...</span>';
            
            try {
                // 1. Login ด้วย Supabase
                const { data, error } = await supabase.auth.signInWithPassword({
                    email,
                    password
                });
                
                if (error) throw error;
                
                // 2. เช็คสิทธิ์แอดมิน
                const adminEmails = Array.isArray(config.adminEmail) 
                    ? config.adminEmail 
                    : [config.adminEmail].filter(e => e);
                
                const isAdmin = adminEmails.length === 0 || adminEmails.includes(email);
                
                if (!isAdmin) {
                    throw new Error('อีเมลนี้ไม่มีสิทธิ์เข้าถึงระบบผู้ดูแลระบบ');
                }
                
                // 3. แสดงข้อความสำเร็จ
                showToast('success', 'เข้าสู่ระบบสำเร็จ! กำลังเปลี่ยนหน้า...');
                
                // 4. รอเล็กน้อยแล้ว redirect ไปหน้า Settings
                setTimeout(() => {
                    window.location.href = 'settings';
                }, 1000);
                
            } catch (error) {
                console.error('Login error:', error);
                showToast('error', error.message || 'เข้าสู่ระบบไม่สำเร็จ กรุณาลองใหม่อีกครั้ง');
                
                // Enable button again
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<span>เข้าสู่ระบบ</span><i class="fas fa-sign-in-alt"></i>';
            }
        });

        // ========== TOAST NOTIFICATION ==========
        function showToast(type, message) {
            toastMessage.textContent = message;
            toast.className = `toast ${type} show`;
            
            const icon = toast.querySelector('i');
            if (type === 'success') {
                icon.className = 'fas fa-check-circle';
            } else if (type === 'error') {
                icon.className = 'fas fa-exclamation-circle';
            }
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // ========== CHECK IF ALREADY LOGGED IN ==========
        // ถ้ามี session อยู่แล้ว ให้ไปหน้า settings เลย
        async function checkExistingSession() {
            if (!supabase) return;
            
            try {
                const { data: { session } } = await supabase.auth.getSession();
                
                if (session?.user) {
                    console.log('✅ Already logged in, redirecting to settings...');
                    window.location.href = 'settings';
                }
            } catch (error) {
                console.error('Session check error:', error);
            }
        }
        
        // Run on page load
        checkExistingSession();
    </script>
</body>
</html>
