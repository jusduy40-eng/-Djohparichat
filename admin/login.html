<script type="module">
    // ========== CONFIG ==========
    let config;
    let supabase;
    
    try {
        const configModule = await import('../lib/config.js');
        config = configModule.config;
    } catch (e) {
        console.warn('⚠️ Using fallback config');
        config = {
            supabaseUrl: 'https://srtsdminbdmxtvjgriev.supabase.co',
            supabaseAnonKey: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNydHNkbWluYmRteHR2amdyaWV2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY4OTU2NzMsImV4cCI6MjA1MjQ3MTY3M30.XYZ123',
            adminEmail: ['jusduy40@gmail.com']
        };
    }
    
    // Initialize Supabase
    try {
        if (config && config.supabaseUrl && config.supabaseAnonKey) {
            supabase = window.supabase.createClient(config.supabaseUrl, config.supabaseAnonKey);
            console.log('✅ Supabase initialized');
        }
    } catch (e) {
        console.error('❌ Failed to initialize Supabase:', e);
    }
    
    // ========== STATE ==========
    let currentUser = null;
    let contentData = {};
    let realtimeSubscription = null;

    // ========== DOM ELEMENTS ==========
    const loader = document.getElementById('loader');
    const loginOverlay = document.getElementById('loginOverlay');
    const authModal = document.getElementById('authModal');
    const authModalClose = document.getElementById('authModalClose');
    const loginForm = document.getElementById('loginForm');
    const openLoginBtn = document.getElementById('openLoginBtn');
    const goHomeBtn = document.getElementById('goHomeBtn');
    const sidebarLogout = document.getElementById('sidebarLogout');
    
    const form = document.getElementById('settingsForm');
    const saveBtn = document.getElementById('saveBtn');
    const resetBtn = document.getElementById('resetBtn');
    const toast = document.getElementById('toast');
    const toastMessage = document.getElementById('toastMessage');
    const adminEmailEl = document.getElementById('adminEmail');
    
    // Form inputs
    const inputs = {
        'title_th': document.getElementById('titleTh'),
        'title_en': document.getElementById('titleEn'),
        'description_th': document.getElementById('descTh'),
        'description_en': document.getElementById('descEn'),
        'experience_years': document.getElementById('expYears'),
        'feature_1_title_th': document.getElementById('feat1TitleTh'),
        'feature_1_title_en': document.getElementById('feat1TitleEn'),
        'feature_1_desc_th': document.getElementById('feat1DescTh'),
        'feature_1_desc_en': document.getElementById('feat1DescEn'),
        'feature_2_title_th': document.getElementById('feat2TitleTh'),
        'feature_2_title_en': document.getElementById('feat2TitleEn'),
        'feature_2_desc_th': document.getElementById('feat2DescTh'),
        'feature_2_desc_en': document.getElementById('feat2DescEn'),
    };
    
    // Preview elements
    const preview = {
        'title_th': document.getElementById('previewTitle'),
        'description_th': document.getElementById('previewDesc'),
        'experience_years': document.getElementById('previewExpYears'),
        'feature_1_title_th': document.getElementById('previewFeat1Title'),
        'feature_1_desc_th': document.getElementById('previewFeat1Desc'),
        'feature_2_title_th': document.getElementById('previewFeat2Title'),
        'feature_2_desc_th': document.getElementById('previewFeat2Desc'),
    };
    
    // Image elements
    const mainImageInput = document.getElementById('mainImageInput');
    const imageUploadZone = document.getElementById('imageUploadZone');
    const currentImageContainer = document.getElementById('currentImageContainer');
    const currentImagePreview = document.getElementById('currentImagePreview');
    const previewImage = document.getElementById('previewImage');
    const previewImagePlaceholder = document.getElementById('previewImagePlaceholder');

    // ========== AUTH CHECK (บังคับเช็คทุกครั้ง) ==========
    async function checkAuth() {
        if (!supabase) {
            console.error('❌ Supabase not initialized');
            redirectToLogin();
            return;
        }
        
        try {
            const { data, error } = await supabase.auth.getSession();
            
            if (error) {
                console.error('Session error:', error);
                redirectToLogin();
                return;
            }
            
            currentUser = data?.session?.user || null;
            
            if (!currentUser) {
                console.log('ℹ️ No session - redirecting to login');
                redirectToLogin();
                return;
            }
            
            console.log('✅ User authenticated:', currentUser.email);
            
            // เช็คสิทธิ์แอดมิน
            const adminEmails = Array.isArray(config.adminEmail) 
                ? config.adminEmail 
                : [config.adminEmail].filter(e => e);
            
            const isAdmin = adminEmails.length === 0 || adminEmails.includes(currentUser.email);
            
            if (!isAdmin) {
                console.log('❌ Not admin - logging out');
                await supabase.auth.signOut();
                redirectToLogin();
                return;
            }
            
            // ✅ ผ่านการตรวจสอบ
            adminEmailEl.textContent = currentUser.email?.split('@')[0] || 'Admin';
            hideLoginOverlay();
            
            // โหลดข้อมูล
            await loadContent();
            setupRealtime();
            setupListeners();
            
        } catch (error) {
            console.error('Auth check error:', error);
            redirectToLogin();
        } finally {
            loader.classList.add('hidden');
        }
    }
    
    function redirectToLogin() {
        console.log('🔐 Redirecting to login page...');
        window.location.href = '../admin/login';
    }
    
    function hideLoginOverlay() {
        if (loginOverlay) {
            loginOverlay.classList.add('hidden');
        }
    }

    // ========== LOGOUT ==========
    async function handleLogout() {
        if (!supabase) return;
        
        try {
            await supabase.auth.signOut();
            currentUser = null;
            showToast('ออกจากระบบสำเร็จ', 'success');
            
            // Redirect กลับไปหน้า login
            setTimeout(() => {
                window.location.href = '../admin/login';
            }, 1000);
            
        } catch (error) {
            console.error('Logout error:', error);
            showToast('ออกจากระบบไม่สำเร็จ', 'error');
        }
    }

    // ========== LOAD CONTENT ==========
    async function loadContent() {
        if (!supabase) return;
        
        try {
            const { data, error } = await supabase
                .from('about_content')
                .select('*');
            
            if (error) {
                console.error('Load error:', error);
                showToast('โหลดข้อมูลไม่สำเร็จ: ' + error.message, 'error');
                return;
            }
            
            contentData = {};
            data.forEach(item => {
                contentData[item.key] = item.value;
            });
            
            // Fill form inputs
            Object.keys(inputs).forEach(key => {
                if (inputs[key] && contentData[key]) {
                    inputs[key].value = contentData[key];
                }
            });
            
            // Update preview
            updatePreview();
            
            // Update image
            if (contentData['main_image']) {
                currentImagePreview.src = contentData['main_image'];
                previewImage.src = contentData['main_image'];
                currentImagePreview.style.display = 'block';
                previewImage.style.display = 'block';
                currentImageContainer.style.display = 'block';
                previewImagePlaceholder.style.display = 'none';
            }
            
        } catch (error) {
            console.error('loadContent error:', error);
            showToast('เกิดข้อผิดพลาด: ' + error.message, 'error');
        }
    }

    // ========== UPDATE PREVIEW ==========
    function updatePreview() {
        Object.keys(preview).forEach(key => {
            if (preview[key] && inputs[key]) {
                preview[key].textContent = inputs[key].value || '';
            }
        });
    }

    // ========== SAVE CONTENT ==========
    async function saveContent() {
        showLoading(true);
        
        let hasError = false;
        
        for (const [key, input] of Object.entries(inputs)) {
            if (input && input.value !== contentData[key]) {
                const { error } = await supabase
                    .from('about_content')
                    .upsert({ 
                        key, 
                        value: input.value, 
                        type: 'text',
                        updated_at: new Date().toISOString()
                    });
                
                if (error) {
                    console.error(`Error saving ${key}:`, error);
                    hasError = true;
                }
            }
        }
        
        showLoading(false);
        
        if (hasError) {
            showToast('บันทึกบางส่วนไม่สำเร็จ', 'error');
        } else {
            showToast('บันทึกสำเร็จ!', 'success');
            await loadContent();
        }
    }

    // ========== IMAGE UPLOAD ==========
    async function handleImageUpload(file) {
        if (!file) return;
        
        if (file.size > 5 * 1024 * 1024) {
            showToast('ไฟล์ใหญ่เกินไป (สูงสุด 5MB)', 'error');
            return;
        }
        
        showLoading(true);
        
        try {
            const fileExt = file.name.split('.').pop();
            const fileName = `about-main-${Date.now()}.${fileExt}`;
            
            const { error: uploadError } = await supabase.storage
                .from('about-images')
                .upload(fileName, file);
            
            if (uploadError) throw uploadError;
            
            const { data: { publicUrl } } = supabase.storage
                .from('about-images')
                .getPublicUrl(fileName);
            
            const { error: dbError } = await supabase
                .from('about_content')
                .upsert({ 
                    key: 'main_image', 
                    value: publicUrl, 
                    type: 'image',
                    updated_at: new Date().toISOString()
                });
            
            if (dbError) throw dbError;
            
            currentImagePreview.src = publicUrl;
            previewImage.src = publicUrl;
            currentImagePreview.style.display = 'block';
            previewImage.style.display = 'block';
            currentImageContainer.style.display = 'block';
            previewImagePlaceholder.style.display = 'none';
            
            contentData['main_image'] = publicUrl;
            
            showToast('อัปโหลดรูปภาพสำเร็จ!', 'success');
            
        } catch (error) {
            console.error('Upload error:', error);
            showToast('อัปโหลดไม่สำเร็จ: ' + error.message, 'error');
        }
        
        showLoading(false);
        mainImageInput.value = '';
    }

    // ========== REALTIME UPDATES ==========
    function setupRealtime() {
        if (!supabase) return;
        
        realtimeSubscription = supabase
            .channel('about_content_admin')
            .on('postgres_changes', {
                event: '*',
                schema: 'public',
                table: 'about_content'
            }, (payload) => {
                if (payload.eventType === 'UPDATE' || payload.eventType === 'INSERT') {
                    const { key, value, type } = payload.new;
                    
                    if (inputs[key]) {
                        inputs[key].value = value;
                    }
                    
                    if (preview[key]) {
                        preview[key].textContent = value;
                    }
                    
                    if (key === 'main_image' && type === 'image') {
                        currentImagePreview.src = value;
                        previewImage.src = value;
                        currentImagePreview.style.display = 'block';
                        previewImage.style.display = 'block';
                        currentImageContainer.style.display = 'block';
                        previewImagePlaceholder.style.display = 'none';
                    }
                    
                    contentData[key] = value;
                }
            })
            .subscribe();
    }

    // ========== EVENT LISTENERS ==========
    function setupListeners() {
        // Input change -> update preview
        Object.values(inputs).forEach(input => {
            if (input) {
                input.addEventListener('input', updatePreview);
            }
        });
        
        // Save button
        saveBtn.addEventListener('click', saveContent);
        
        // Reset button
        resetBtn.addEventListener('click', async () => {
            if (confirm('ต้องการรีเซ็ตฟอร์มเป็นค่าเดิมจากฐานข้อมูล?')) {
                await loadContent();
                showToast('รีเซ็ตสำเร็จ', 'success');
            }
        });
        
        // Image upload - click
        imageUploadZone.addEventListener('click', () => mainImageInput.click());
        
        // Image upload - drag & drop
        imageUploadZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            imageUploadZone.style.borderColor = '#1e88e5';
            imageUploadZone.style.background = '#f0f9ff';
        });
        
        imageUploadZone.addEventListener('dragleave', () => {
            imageUploadZone.style.borderColor = '#cbd5e1';
            imageUploadZone.style.background = '#f8fafc';
        });
        
        imageUploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            imageUploadZone.style.borderColor = '#cbd5e1';
            imageUploadZone.style.background = '#f8fafc';
            
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                handleImageUpload(file);
            }
        });
        
        // Image input change
        mainImageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) handleImageUpload(file);
        });
        
        // Logout button
        sidebarLogout?.addEventListener('click', async (e) => {
            e.preventDefault();
            if (confirm('คุณต้องการออกจากระบบใช่หรือไม่?')) {
                await handleLogout();
            }
        });
        
        // Go home button
        goHomeBtn?.addEventListener('click', () => {
            window.location.href = '../index';
        });
    }

    // ========== UTILS ==========
    function showToast(message, type = 'success') {
        toastMessage.textContent = message;
        toast.className = `toast ${type} show`;
        
        setTimeout(() => {
            toast.classList.remove('show');
        }, 3000);
    }
    
    function showLoading(show) {
        if (show) {
            loader.classList.remove('hidden');
            saveBtn.disabled = true;
        } else {
            loader.classList.add('hidden');
            saveBtn.disabled = false;
        }
    }

    // ========== INIT ==========
    async function init() {
        console.log('🚀 Settings page initializing...');
        
        // 1. เช็ค authentication (บังคับทุกครั้ง)
        await checkAuth();
        
        console.log('✅ Settings page initialized');
    }
    
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
</script>
