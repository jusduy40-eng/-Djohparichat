<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>การตั้งค่า | Admin - Djohparichat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body class="admin-body">
    <aside class="admin-sidebar">
        <div class="admin-logo"><h2>Djohparichat</h2></div>
        <nav class="admin-nav">
            <ul>
                <li><a href="index.html"><i class="fas fa-dashboard"></i> <span data-th="แดชบอร์ด" data-en="Dashboard">แดชบอร์ด</span></a></li>
                <li><a href="contents.html"><i class="fas fa-file-alt"></i> <span data-th="จัดการเนื้อหา" data-en="Contents">จัดการเนื้อหา</span></a></li>
                <li><a href="portfolio.html"><i class="fas fa-briefcase"></i> <span data-th="จัดการผลงาน" data-en="Portfolio">จัดการผลงาน</span></a></li>
                <li><a href="messages.html"><i class="fas fa-envelope"></i> <span data-th="ข้อความติดต่อ" data-en="Messages">ข้อความติดต่อ</span></a></li>
                <li><a href="settings.html" class="active"><i class="fas fa-cog"></i> <span data-th="การตั้งค่า" data-en="Settings">การตั้งค่า</span></a></li>
                <li><a href="../index.html" target="_blank"><i class="fas fa-external-link-alt"></i> <span data-th="เปิดเว็บไซต์" data-en="View Website">เปิดเว็บไซต์</span></a></li>
                <li><a href="login.html" class="logout"><i class="fas fa-sign-out-alt"></i> <span data-th="ออกจากระบบ" data-en="Logout">ออกจากระบบ</span></a></li>
            </ul>
        </nav>
    </aside>

    <main class="admin-main">
        <header class="admin-header">
            <h1 data-th="การตั้งค่า" data-en="Settings">การตั้งค่า</h1>
            <div class="admin-user">
                <span data-th="ผู้ดูแลระบบ" data-en="Admin">ผู้ดูแลระบบ</span>
                <div style="width: 40px; height: 40px; background: var(--primary-blue); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white;"><i class="fas fa-user"></i></div>
            </div>
        </header>

        <div class="admin-content">
            <div class="admin-section">
                <h2 data-th="ข้อมูลเว็บไซต์" data-en="Website Information">ข้อมูลเว็บไซต์</h2>
                <form class="admin-form">
                    <div class="admin-form-group">
                        <label data-th="ชื่อเว็บไซต์ (ไทย)" data-en="Site Name (Thai)">ชื่อเว็บไซต์ (ไทย)</label>
                        <input type="text" value="Djohparichat - เรียนรู้ AI และประกันชีวิต">
                    </div>
                    <div class="admin-form-group">
                        <label data-th="ชื่อเว็บไซต์ (อังกฤษ)" data-en="Site Name (English)">ชื่อเว็บไซต์ (อังกฤษ)</label>
                        <input type="text" value="Djohparichat - Learn AI & Insurance">
                    </div>
                    <div class="admin-form-group">
                        <label data-th="คำอธิบายเว็บไซต์" data-en="Site Description">คำอธิบายเว็บไซต์</label>
                        <textarea rows="3">ผู้เชี่ยวชาญด้าน AI และประกันชีวิต</textarea>
                    </div>
                </form>
            </div>

            <div class="admin-section">
                <h2 data-th="ข้อมูลติดต่อ" data-en="Contact Information">ข้อมูลติดต่อ</h2>
                <form class="admin-form">
                    <div class="admin-form-group">
                        <label data-th="โทรศัพท์" data-en="Phone">โทรศัพท์</label>
                        <input type="tel" value="+66 XX XXX XXXX">
                    </div>
                    <div class="admin-form-group">
                        <label data-th="อีเมล" data-en="Email">อีเมล</label>
                        <input type="email" value="contact@djohparichat.site">
                    </div>
                    <div class="admin-form-group">
                        <label data-th="ที่อยู่" data-en="Address">ที่อยู่</label>
                        <textarea rows="2">กรุงเทพมหานคร, ประเทศไทย</textarea>
                    </div>
                </form>
            </div>

            <div class="admin-section">
                <h2 data-th="โลโก้เว็บไซต์" data-en="Website Logo">โลโก้เว็บไซต์</h2>
                <div class="image-upload">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <p data-th="คลิกหรือลากไฟล์มาวางที่นี่" data-en="Click or drag files here">คลิกหรือลากไฟล์มาวางที่นี่</p>
                </div>
            </div>

            <button class="btn btn-primary" style="margin-top: 20px;">
                <i class="fas fa-save"></i>
                <span data-th="บันทึกการตั้งค่า" data-en="Save Settings">บันทึกการตั้งค่า</span>
            </button>
        </div>
    </main>

    <button class="admin-mobile-toggle"><i class="fas fa-bars"></i></button>
    <script src="../assets/js/admin.js"></script>
</body>
</html>
